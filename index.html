<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reloj Cucú</title>

<link rel="stylesheet" href="./styles.css">
</head>

<body>

<div class="container">

    <div class="clock">
        <div class="roof"></div>

        <div class="door"></div>
        <div class="cucu" id="cucu">🐦</div>

        <div class="analog">
            <div class="hand hour" id="hour"></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>
        </div>

        <div class="digital">
            <div id="time"></div>
            <div id="date"></div>
        </div>
    </div>

    <div class="info">
        <p id="location">📍 Ubicación...</p>
        <p id="weather">🌦️ Clima...</p>

        <button onclick="toggleModo()">🌙 Cambiar modo</button>
    </div>

</div>

<audio id="sound" src="./sonido/sonido cucu.mp3"></audio>

<script src="./script.js"></script>
<footer>
    <p><small>&copy; 2026 Reloj Cucú. Todos los derechos reservados.</small></small></p>
</footer>

</body>
</html>
