<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reloj Cucú PRO</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <div class="clock">
        <div class="roof"></div>

        <!-- Puerta -->
        <div class="door"></div>
        <div class="cucu" id="cucu">🐦</div>

        <!-- Reloj analógico -->
        <div class="analog">
            <div class="hand hour" id="hour"></div>
            <div class="hand minute" id="minute"></div>
            <div class="hand second" id="second"></div>
        </div>

        <!-- Reloj digital -->
        <div class="digital">
            <div id="time"></div>
            <div id="date"></div>
        </div>
    </div>

    <div class="info">
        <p id="location">📍 Obteniendo ubicación...</p>
        <button onclick="obtenerUbicacion()">Actualizar ubicación</button>
    </div>

</div>

<audio id="sound" src="https://www.soundjay.com/clock/cuckoo-clock-1.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
